# fly.toml app configuration file generated for build-your-own-bundle on 2026-02-13T16:12:36Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'build-your-own-bundle'
primary_region = 'fra'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "bundle_data"
  destination = "/app/prisma"
