name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr_agent:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Run Qodo PR Agent
        uses: qodo-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.QODO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
